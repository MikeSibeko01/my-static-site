<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta settings -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Page title -->
    <title>My First Azure Website</title>

    <!-- Simple styling -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #0078D4;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            padding: 20px;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        button {
            padding: 10px 15px;
            background-color: #0078D4;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #005a9e;
        }
    </style>
</head>

<body>

    <!-- Header section -->
    <header>
        <h1>Welcome to My Website 🚀</h1>
        <p>Hosted on Azure Static Web Apps</p>
    </header>

    <!-- Main content -->
    <main>
        <h2>About Me</h2>
        <p>This is my first cloud-hosted website!</p>

        <h2>Interactive Button</h2>
        <button onclick="showMessage()">Click Me</button>
        <p id="message"></p>
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Website</p>
    </footer>

    <!-- JavaScript -->
    <script>
        function showMessage() {
            document.getElementById("message").innerHTML = "Hello! You clicked the button 🎉";
        }
    </script>

</body>
</html>
